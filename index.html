<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPD ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="black"/><text x="50" y="70" font-size="80" fill="white" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle">O</text></svg>'>    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 900: '#312e81' } },
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; overflow-y: hidden; }
        .glass-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border: 1px solid rgba(226,232,240,0.8); border-radius: 16px; box-shadow: 0 4px 20px -2px rgba(0,0,0,0.03); }
        .premium-input { width: 100%; background: #f1f5f9; border: 1px solid transparent; border-radius: 8px; padding: 8px 12px; font-size: 0.85rem; font-weight: 500; color: #1e293b; transition: all 0.2s ease; }
        .premium-input:focus { background: #fff; border-color: #6366f1; outline: none; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        .premium-input::placeholder { color: #94a3b8; font-weight: 400; }
        .input-label { display: block; font-size: 0.65rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; margin-left: 2px; }
        .check-pill input { display: none; }
        .check-pill span { display: inline-block; padding: 3px 10px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 20px; font-size: 0.7rem; font-weight: 600; color: #64748b; cursor: pointer; transition: 0.2s; user-select: none; }
        .check-pill input:checked + span { background: #e0e7ff; border-color: #6366f1; color: #4f46e5; }
        .advice-pill { padding: 4px 12px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 20px; font-size: 0.75rem; font-weight: 600; color: #64748b; cursor: pointer; transition: 0.2s; }
        .advice-pill:hover { background: #ccfbf1; border-color: #14b8a6; color: #0f766e; }
        .scroll-pane::-webkit-scrollbar { width: 5px; }
        .scroll-pane::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .scroll-pane::-webkit-scrollbar-track { background: transparent; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .search-item-active { background-color: #e0e7ff !important; border-left: 4px solid #4f46e5; }
        .inline-search-container { position: relative; margin-top: 10px; }
        .inline-search-input { width: 100%; background: white; border: 2px dashed #cbd5e1; border-radius: 12px; padding: 12px 16px 12px 40px; font-size: 1rem; font-weight: 600; color: #1e293b; transition: all 0.2s ease; }
        .inline-search-input:focus { border-color: #4f46e5; border-style: solid; outline: none; box-shadow: 0 4px 20px -2px rgba(79,70,229,0.15); }
        .inline-search-icon { position: absolute; left: 14px; top: 14px; color: #94a3b8; }

        /* =====================================================
           DRUG CARD
           ===================================================== */
        .rx-card {
            background: #fff;
            border-radius: 10px;
            border: 1px solid #e4e9f2;
            box-shadow: 0 1px 4px rgba(15,23,42,0.04);
            overflow: hidden;
            transition: box-shadow 0.15s, border-color 0.15s;
            display: flex;        /* left sidebar + main content side by side */

            /* Magic bullet for scroll performance */
            contain: content; 
            
            /* Forces the browser to use the GPU (Hardware Acceleration) */
            transform: translateZ(0); 
            will-change: transform;


        }
        .rx-card:hover { box-shadow: 0 4px 16px rgba(79,70,229,0.1); border-color: #c7d2fe; }
        .rx-card.is-overdose { border-color: #fca5a5 !important; }

        /* ── LEFT SIDEBAR DELETE STRIP ── */
        .rx-sidebar {
            flex-shrink: 0;
            width: 28px;
            background: #f8fafc;
            border-right: 1px solid #eef0f6;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.12s;
        }
        .rx-sidebar:hover { background: #fee2e2; }
        .rx-sidebar:hover .rx-sidebar-icon { color: #ef4444; }
        .rx-sidebar-icon {
            color: #d1d5db;
            transition: color 0.12s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        /* three small dots as delete indicator */
        .rx-sidebar-icon span {
            display: block;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: currentColor;
        }

        /* ── MAIN CONTENT (right of sidebar) ── */
        .rx-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }

        /* ── ROW 1: Header ── */
        .rx-header {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 9px 12px 8px 10px;
            background: linear-gradient(to right, #fafaff, #fff);
            border-bottom: 1px solid #f0f3fa;
        }
        .rx-num {
            flex-shrink: 0;
            min-width: 22px;
            height: 22px;
            padding: 0 4px;
            border-radius: 5px;
            background: #4f46e5;
            color: #fff;
            font-size: 10px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1px;
        }
        .rx-card.is-overdose .rx-num { background: #ef4444; }
        .rx-names { flex: 1; min-width: 0; }
        .rx-brand { font-size: 13px; font-weight: 800; color: #0f172a; line-height: 1.25; word-break: break-word; }
        .rx-generic { font-size: 10.5px; font-weight: 500; color: #64748b; font-style: italic; line-height: 1.4; margin-top: 1px; word-break: break-word; }
        .rx-maxdose {
            flex-shrink: 0; font-size: 8.5px; font-weight: 700; color: #94a3b8;
            background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 5px;
            padding: 2px 6px; white-space: nowrap; align-self: flex-start;
            margin-top: 2px; text-align: right; line-height: 1.5;
        }

        /* ── ROW 2: Controls ── */
        .rx-controls { display: flex; align-items: stretch; min-height: 62px; }

        /* Freq segment */
        .rx-freq {
            display: flex; align-items: center; gap: 3px;
            padding: 8px 10px; border-right: 1px solid #f0f3fa;
            flex-shrink: 0; background: #fdfdff;
        }
        .fq {
            width: 33px; height: 38px; border-radius: 8px;
            border: 1.5px solid #dde5f0; background: #f8fafc; color: #94a3b8;
            font-size: 10px; font-weight: 900;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 2px; cursor: pointer; transition: all 0.12s; user-select: none;
        }
        .fq .fq-sub { font-size: 7px; font-weight: 600; opacity: 0.6; }
        .fq:hover { border-color: #a5b4fc; background: #eef2ff; color: #4f46e5; }
        .fq.on-M  { background: #fef9c3; border-color: #eab308; color: #713f12; box-shadow: 0 2px 6px rgba(234,179,8,.25); }
        .fq.on-AN { background: #dcfce7; border-color: #22c55e; color: #14532d; box-shadow: 0 2px 6px rgba(34,197,94,.25); }
        .fq.on-E  { background: #ffedd5; border-color: #f97316; color: #7c2d12; box-shadow: 0 2px 6px rgba(249,115,22,.25); }
        .fq.on-N  { background: #ede9fe; border-color: #8b5cf6; color: #3b0764; box-shadow: 0 2px 6px rgba(139,92,246,.25); }

        /* Safety badge */
        .rx-safety { display: flex; align-items: center; padding: 0 6px 0 4px; border-right: 1px solid #f0f3fa; flex-shrink: 0; }
        .safety-badge { font-size: 8.5px; font-weight: 800; padding: 3px 6px; border-radius: 5px; letter-spacing: 0.03em; white-space: nowrap; }
        .safety-ok   { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
        .safety-over { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

        /* Advice segment */
        .rx-advice {
            flex: 1; min-width: 0;
            display: flex; flex-direction: column; justify-content: center;
            gap: 4px; padding: 6px 10px; border-right: 1px solid #f0f3fa;
        }

        /* ── GROUPED PILL ROWS ── */
        .pill-row { display: flex; align-items: center; gap: 3px; flex-wrap: wrap; }

        /* Separator styles — two distinct types */
        .pill-sep-1 {
            /* solid thin line — between food-timing groups */
            display: inline-block; width: 1px; height: 16px;
            background: #cbd5e1; margin: 0 4px; flex-shrink: 0;
        }
        .pill-sep-2 {
            /* double-dot — between timing and quantity */
            display: inline-flex; flex-direction: column; gap: 2px;
            margin: 0 5px; flex-shrink: 0;
        }
        .pill-sep-2 span { display: block; width: 2px; height: 2px; border-radius: 50%; background: #94a3b8; }

        /* Base pill */
        .ap {
            height: 22px; padding: 0 7px; border-radius: 5px;
            font-size: 9.5px; font-weight: 700;
            border: 1.5px solid #dde5f0; background: #f8fafc; color: #475569;
            cursor: pointer; transition: all 0.12s; white-space: nowrap;
            display: inline-flex; align-items: center; user-select: none;
        }

        /* GROUP 1a — Before meals (BBF · BL · BD): soft violet/lavender */
        .ap.g-meal { border-color: #c4b5fd; background: #f5f3ff; color: #5b21b6; }
        .ap.g-meal:hover { border-color: #8b5cf6; background: #ede9fe; color: #4c1d95; }
        .ap.g-meal.on { background: #6d28d9; border-color: #4c1d95; color: #fff; box-shadow: 0 1px 4px rgba(109,40,217,.3); }

        /* GROUP 1b — With/After food (ES · AF · WF): soft blue */
        .ap.g-food { border-color: #93c5fd; background: #eff6ff; color: #1d4ed8; }
        .ap.g-food:hover { border-color: #3b82f6; background: #dbeafe; color: #1e3a8a; }
        .ap.g-food.on { background: #1d4ed8; border-color: #1e3a8a; color: #fff; box-shadow: 0 1px 4px rgba(29,78,216,.3); }

        /* GROUP 1c — Water (+HGW · +1LW): soft cyan/teal */
        .ap.g-water { border-color: #67e8f9; background: #ecfeff; color: #0e7490; }
        .ap.g-water:hover { border-color: #06b6d4; background: #cffafe; color: #164e63; }
        .ap.g-water.on { background: #0e7490; border-color: #164e63; color: #fff; box-shadow: 0 1px 4px rgba(14,116,144,.3); }

        /* GROUP 2 — Frequency modifiers: teal tint */
        .ap.g-freq { border-color: #99f6e4; background: #f0fdf9; color: #0f766e; }
        .ap.g-freq:hover { border-color: #14b8a6; background: #ccfbf1; color: #0f766e; }
        .ap.g-freq.on { background: #0f766e; border-color: #0d5f58; color: #fff; box-shadow: 0 1px 4px rgba(15,118,110,.3); }

        /* GROUP 3 — Urgency/Special: red tint resting, red fill active */
        .ap.g-urgent { border-color: #fca5a5; background: #fff5f5; color: #b91c1c; }
        .ap.g-urgent:hover { border-color: #ef4444; background: #fee2e2; color: #991b1b; }
        .ap.g-urgent.on { background: #dc2626; border-color: #991b1b; color: #fff; box-shadow: 0 1px 4px rgba(220,38,38,.3); }

        /* Custom note input */
        .rx-note {
            background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 6px;
            padding: 4px 9px; font-size: 10.5px; font-weight: 500; color: #334155;
            width: 100%; transition: all 0.15s;
        }
        .rx-note:focus { background: #fff; border-color: #6366f1; outline: none; box-shadow: 0 0 0 2px rgba(99,102,241,.1); }
        .rx-note::placeholder { color: #c0cad8; font-style: italic; }

        /* Days segment */
        .rx-days {
            flex-shrink: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 6px 10px; gap: 3px; background: #fdfdff; min-width: 52px;
        }
        .rx-days-lbl { font-size: 8px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: .07em; }
        .rx-days-inp {
            width: 42px; text-align: center; background: #f1f5f9;
            border: 1.5px solid #dde5f0; border-radius: 7px; padding: 5px 2px;
            font-size: 15px; font-weight: 800; color: #0f172a; transition: all 0.15s;
        }
        .rx-days-inp:focus { background: #fff; border-color: #6366f1; outline: none; box-shadow: 0 0 0 2px rgba(99,102,241,.1); }

        /* =====================================================
           PRINT LAYOUT
           ===================================================== */
        @media print {
            @page { size: A4; margin: 5mm; }
            body { background: white; overflow-y: visible; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            #screen-layout { display: none !important; }
            #lock-screen   { display: none !important; }
            #print-layout  {
                display: block !important; width: 100%; color: black;
                font-family: 'Inter', sans-serif;
                padding-top: 35mm !important;
                padding-left: 12mm !important;
                padding-right: 10mm !important;
            }
        }
        @media screen { #print-layout { display: none; } }
    </style>
</head>
<body class="antialiased">

<div id="lock-screen" class="fixed inset-0 z-[9999] bg-[#0f172a] flex items-center justify-center transition-all duration-700" style="display:flex;">
    <div class="text-slate-600 flex flex-col items-center select-none pointer-events-none">
        <svg class="w-16 h-16 mb-6 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        <p class="text-[10px] font-bold tracking-[0.3em] uppercase opacity-20">Console Locked</p>
    </div>
</div>

<div id="print-layout"></div>

<div id="screen-layout" class="p-4 lg:p-6 min-h-screen" style="display:none;">
    <header class="max-w-[1600px] mx-auto mb-5 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-xl bg-brand-600 flex items-center justify-center text-white shadow-lg">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight text-slate-900">OPD ENGINE</h1>
                <p class="text-[10px] font-bold text-brand-600 uppercase tracking-widest">Developed by Dr. Mit Panchani</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="clearWorkspace()" class="px-4 py-2 text-sm font-semibold text-slate-500 hover:text-slate-800 hover:bg-white rounded-lg transition-all border border-slate-200">Clear Data</button>
            <button onclick="prepareAndPrint()" class="px-5 py-2 bg-slate-900 hover:bg-black text-white text-sm font-bold rounded-lg shadow-md transition-all flex items-center">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
                Print
            </button>
        </div>
    </header>

<div class="max-w-[1600px] mx-auto mb-4 w-full">
        <div class="glass-card p-4 border-l-4 border-l-indigo-500 shadow-sm transition-all" id="quickEntryCard">
            <div class="flex items-center justify-between mb-3">
                <h2 class="font-bold text-slate-800 flex items-center gap-2 text-sm uppercase tracking-wider">
                    <svg class="w-4 h-4 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    Smart Command Line
                </h2>
                <span id="quickEntryStatus" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest hidden">✅ Data Loaded Successfully</span>
            </div>
            <div class="relative flex gap-2 items-center">
                <div class="relative flex-1">
                    <input type="text" id="quickEntryInput" class="inline-search-input !py-3 !pl-10 !pr-4 !text-base !font-semibold !border-solid !border-2 !border-slate-300 focus:!border-indigo-500 w-full" placeholder="e.g. Ramila 45 f 130/80 88 rs-n cvs-n t-n kco-dm,htn c/o-fever and cough" autocomplete="off">
                    <span class="absolute left-4 top-3.5 text-indigo-500 font-bold">⌨️</span>
                </div>
                <button id="quickEntryBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-xl text-sm font-bold shadow-md transition-colors shrink-0">Execute</button>
            </div>
            <div id="quickEntryChips" class="flex flex-wrap gap-2 mt-4 min-h-[24px]">
                </div>
        </div>
    </div>

    
 <main class="max-w-[1600px] mx-auto w-full flex flex-col gap-4">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 w-full">
            
            <details class="glass-card group bg-white/90 shadow-sm z-50">
                <summary class="p-3 font-bold text-slate-800 cursor-pointer flex justify-between items-center list-none outline-none">
                    <span class="flex items-center gap-2 text-sm"><span class="w-2 h-2 rounded-full bg-brand-500"></span> 1. Demographics & Vitals</span>
                    <svg class="w-4 h-4 text-slate-400 transition-transform group-open:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                </summary>
                <div class="p-4 pt-0 space-y-3 border-t border-slate-100 mt-2">
                    <div class="grid grid-cols-2 gap-2">
                        <div><label class="input-label">Date</label><input type="date" id="date" class="premium-input !px-2"></div>
                        <div><label class="input-label">Sex</label><select id="ptSex" class="premium-input !px-2"><option>M</option><option>F</option></select></div>
                    </div>
                    <div class="grid grid-cols-[1fr_80px] gap-2">
                        <div><label class="input-label">Patient Name</label><input type="text" id="ptName" placeholder="Full Name" class="premium-input font-bold" oninput="this.value=this.value.toUpperCase()"></div>
                        <div><label class="input-label">Age</label><input type="number" id="ptAge" placeholder="Yrs" class="premium-input text-center"></div>
                    </div>
                    <div class="grid grid-cols-4 gap-2">
                        <div><label class="input-label">BP</label><input type="text" id="bpInput" placeholder="120/80" class="premium-input !px-1 text-center"></div>
                        <div><label class="input-label">HR</label><input type="number" id="ptPulse" placeholder="72" class="premium-input !px-1 text-center"></div>
                        <div><label class="input-label">Temp</label><input type="text" id="ptTemp" placeholder="98.6 F" class="premium-input !px-1 text-center"></div>
                        <div><label class="input-label">SpO2</label><input type="text" id="ptSpo2" value="98% with RA" class="premium-input !px-1 text-center"></div>
                    </div>
                    <div class="grid grid-cols-4 gap-2">
                        <div><label class="input-label">R/S</label><input type="text" id="ptRS" class="premium-input !px-1 text-center"></div>
                        <div><label class="input-label">CVS</label><input type="text" id="ptCVS" class="premium-input !px-1 text-center"></div>
                        <div><label class="input-label">P/A</label><input type="text" id="ptPA" placeholder="Blank" class="premium-input !px-1 text-center"></div>
                        <div><label class="input-label">CNS</label><input type="text" id="ptCNS" placeholder="Blank" class="premium-input !px-1 text-center"></div>
                    </div>
                </div>
            </details>

            <details class="glass-card group bg-white/90 shadow-sm z-50" id="kcoSection">
                <summary class="p-3 font-bold text-slate-800 cursor-pointer flex justify-between items-center list-none outline-none">
                    <span class="flex items-center gap-2 text-sm"><span class="w-2 h-2 rounded-full bg-rose-500"></span> 2. KCO</span>
                    <svg class="w-4 h-4 text-slate-400 transition-transform group-open:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>

<script>
// ── LOCK ─────────────────────────────────────────────────
let keyBuffer="";const TARGET=1570014;
function hashCode(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return h;}
if(sessionStorage.getItem('clinical_unlocked')!=='true'){
    document.getElementById('screen-layout').style.display='none';
    document.getElementById('lock-screen').style.display='flex';
    window.addEventListener('keydown',function L(e){
        if(e.key.length===1){keyBuffer+=e.key;if(keyBuffer.length>4)keyBuffer=keyBuffer.slice(-4);
        if(hashCode(keyBuffer)===TARGET){sessionStorage.setItem('clinical_unlocked','true');
        document.getElementById('lock-screen').style.opacity='0';
        setTimeout(()=>{document.getElementById('lock-screen').style.display='none';
        document.getElementById('screen-layout').style.display='block';
        document.getElementById("ptName")?.focus();},500);window.removeEventListener('keydown',L);}}
    });
}else{document.getElementById('lock-screen').style.display='none';document.getElementById('screen-layout').style.display='block';}

// ── STATE ─────────────────────────────────────────────────
let drugs=[],rxItems=[],currentSearchFocus=-1,tapers=[],currentTaperSteps=[];

// Advice pill definitions
// group: 'meal' | 'food' | 'water' | 'freq' | 'urgent'
const ADVICE_OPTS=[
    // LINE 1 — sub-group meal (violet)
    {id:"Before Breakfast",      label:"BBF",  group:"meal"},
    {id:"Before Lunch",          label:"BL",   group:"meal"},
    {id:"Before Dinner",         label:"BD",   group:"meal"},
    // sep-1 after BD
    // sub-group food (blue)
    {id:"Empty Stomach",         label:"ES",   group:"food"},
    {id:"After Food",            label:"AF",   group:"food"},
    {id:"With Food",             label:"WF",   group:"food"},
    // sep-2 after WF
    // sub-group water (cyan)
    {id:"+ Half glass of water", label:"+HGW", group:"water"},
    {id:"+ 1L water (ORS)",      label:"+1LW", group:"water"},
    // LINE 2 — freq (teal) | sep | urgent (red)
    {id:"Alternate Day",         label:"AL D", group:"freq"},
    {id:"Weekly Once",           label:"WO",   group:"freq"},
    // sep-1 after WO
    {id:"SOS",                   label:"SOS",  group:"urgent"},
    {id:"STAT",                  label:"STAT", group:"urgent"},
    // sep-1 after STAT
    {id:"MD",                    label:"MD",   group:"urgent"},
    {id:"SUBLINGUAL",            label:"SL",   group:"urgent"},
];

const FREQ_DEF=[
    {lbl:"M", sub:"Morn", cls:"on-M",  idx:0},
    {lbl:"AN",sub:"Aftn", cls:"on-AN", idx:1},
    {lbl:"E", sub:"Eve",  cls:"on-E",  idx:2},
    {lbl:"N", sub:"Night",cls:"on-N",  idx:3}
];

function extractDose(text){
    if(!text)return[0];const str=String(text).toUpperCase();
    return str.split(/\s*(?:\+|&)\s*/).map(p=>{
        let m;
        if((m=p.match(/(\d+(?:\.\d+)?)\s*(?:G|GM)\b/)))return+m[1]*1000;
        if((m=p.match(/(\d+(?:\.\d+)?)\s*MG\b/)))return+m[1];
        if((m=p.match(/(\d+(?:\.\d+)?)\s*MCG\b/)))return+m[1]/1000;
        if((m=p.match(/(\d+(?:\.\d+)?)\s*(?:IU|ML)\b/)))return+m[1];
        if((m=p.match(/(\d+(?:\.\d+)?)/)))return+m[1];
        return 0;
    });
}



// ── SEARCH ────────────────────────────────────────────────


const srchInput=document.getElementById("drugSearch");
srchInput.addEventListener("keydown",e=>{
    const rd=document.getElementById("results");
    if(!rd||rd.classList.contains("hidden"))return;
    const items=rd.getElementsByClassName("search-item");
    if(!items.length)return;
    if(e.key==="ArrowDown"){currentSearchFocus++;actv(items);e.preventDefault();}
    else if(e.key==="ArrowUp"){currentSearchFocus--;actv(items);e.preventDefault();}
    else if(e.key==="Enter"){e.preventDefault();(currentSearchFocus>-1?items[currentSearchFocus]:items[0]).click();}
});
function actv(items){
    Array.from(items).forEach(i=>i.classList.remove("search-item-active"));
    if(currentSearchFocus>=items.length)currentSearchFocus=0;
    if(currentSearchFocus<0)currentSearchFocus=items.length-1;
    items[currentSearchFocus].classList.add("search-item-active");
    items[currentSearchFocus].scrollIntoView({block:"nearest",behavior:"smooth"});
}




let searchDebounce;
const netlifyAPI = "https://drugs.drmjp93.workers.dev";

srchInput.addEventListener("input", function() {
    const q = this.value.toLowerCase().trim();
    const rd = document.getElementById("results");
    currentSearchFocus = -1;
    
    if(q.length < 2) { 
        rd.classList.add("hidden"); 
        return; 
    }
    
    // Show a quick loading message while fetching
    rd.innerHTML = `<div class="p-3 text-center text-xs font-semibold text-slate-400">Searching secure database...</div>`;
    rd.classList.remove("hidden");

    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(async () => {
        try {
            const response = await fetch(`${netlifyAPI}?q=${encodeURIComponent(q)}`);
            const matches = await response.json();
            renderResults(matches);
            setTimeout(()=>document.querySelector('.inline-search-container').scrollIntoView({behavior:'smooth',block:'center'}),50);
        } catch (error) {
            console.error("API Error:", error);
            rd.innerHTML = `<div class="p-3 text-center text-xs text-red-500 font-semibold">Error connecting to database.</div>`;
        }
    }, 250); // 250ms delay to prevent server spam while typing
});





function renderResults(list){
    const rd=document.getElementById("results");rd.innerHTML="";
    if(!list.length){rd.innerHTML=`<div class="p-3 text-center text-xs font-semibold text-slate-400">No molecules found</div>`;rd.classList.remove("hidden");return;}
    rd.classList.remove("hidden");
    list.forEach(d=>{
        const item=document.createElement("div");
        item.className="search-item p-3 hover:bg-brand-50 cursor-pointer flex justify-between items-center transition-colors";
        item.innerHTML=`<div><div class="font-bold text-sm text-slate-900">${d["FIRST BRAND"]}</div><div class="text-[10px] text-slate-500 font-bold mt-0.5"><i>(${d.Active_Content})</i></div></div><div class="text-[9px] bg-slate-100 text-slate-600 px-2 py-1 rounded font-bold uppercase tracking-wider text-right">Max:<br>${d.Max_Dose_Adult||'N/A'}</div>`;
        item.onclick=()=>{addDrug(d);srchInput.value="";rd.classList.add("hidden");srchInput.focus();setTimeout(()=>document.querySelector('.inline-search-container').scrollIntoView({behavior:'smooth',block:'center'}),50);};
        rd.appendChild(item);
    });
}

// ── TAPER ─────────────────────────────────────────────────
function addTaperStep(){
    const dose=document.getElementById('tDose').value.trim(),freq=document.getElementById('tFreq').value.trim(),days=document.getElementById('tDays').value.trim();
    if(!dose||!freq||!days){alert("Fill Dose, Freq, Days.");return;}
    currentTaperSteps.push({dose,freq,days});
    document.getElementById('tDose').value='';document.getElementById('tDays').value='';document.getElementById('tDose').focus();
    renderTaperBuilder();
}
function removeTaperStep(i){currentTaperSteps.splice(i,1);renderTaperBuilder();}
function renderTaperBuilder(){
    const c=document.getElementById('taperPreview');
    if(!currentTaperSteps.length){c.innerHTML='<span class="text-[10px] text-slate-400 italic font-medium">Add steps below to build taper...</span>';return;}
    c.innerHTML=currentTaperSteps.map((s,i)=>`<span class="inline-flex items-center gap-1 bg-rose-100 text-rose-800 px-2 py-1 rounded text-[10px] font-bold border border-rose-200">${s.dose} (${s.freq}) x ${s.days}d<button type="button" onclick="removeTaperStep(${i})" class="ml-1 text-rose-500 hover:text-rose-800">&times;</button></span>`).join('<span class="text-slate-400 text-xs font-bold mx-0.5">➔</span>')+'<span class="text-slate-400 text-xs font-bold mx-0.5">➔</span><span class="inline-flex items-center bg-slate-200 text-slate-600 px-2 py-1 rounded text-[10px] font-bold">STOP</span>';
}
function saveTaperProtocol(){
    const drug=document.getElementById('tDrug').value.trim();
    if(!drug)return alert("Enter Drug Name.");if(!currentTaperSteps.length)return alert("Add at least one step.");
    tapers.push({id:Date.now(),drug,steps:[...currentTaperSteps]});
    document.getElementById('tDrug').value='';currentTaperSteps=[];renderTaperBuilder();renderActiveTapers();
}
function deleteTaperProtocol(id){tapers=tapers.filter(t=>t.id!==id);renderActiveTapers();}
function renderActiveTapers(){
    const c=document.getElementById('activeTapers');if(!tapers.length){c.innerHTML='';return;}
    c.innerHTML=tapers.map(t=>`<div class="bg-white border border-rose-200 rounded-lg p-2.5 flex justify-between items-center shadow-sm"><div><h4 class="text-xs font-bold text-slate-900">${t.drug}</h4><p class="text-[10px] font-bold text-rose-600 mt-0.5">${t.steps.map(s=>`${s.dose} (${s.freq}) x ${s.days}d`).join(' ➔ ')} ➔ STOP</p></div><button type="button" onclick="deleteTaperProtocol(${t.id})" class="text-slate-300 hover:text-red-500 bg-slate-50 p-1.5 rounded"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button></div>`).join('');
}

// ── RX ────────────────────────────────────────────────────
function setGlobalDays(val){const v=parseInt(val)||1;rxItems.forEach(i=>i.days=v);renderRx();}
function addDrug(d){
    rxItems.push({id:Date.now()+Math.floor(Math.random()*1000),brand:d["FIRST BRAND"],molecule:d.Active_Content,maxRaw:d.Max_Dose_Adult||'Not specified',strength:extractDose(d.Active_Content),max:extractDose(d.Max_Dose_Adult),freq:"1-0-0-0",days:parseInt(document.getElementById("masterDays").value)||5,advice:"After Food"});
    renderRx();
}

function buildPillRows(itemId, activeArr){
    const sep1 = `<span class="pill-sep-1"></span>`;
    const sep2 = `<span class="pill-sep-2"><span></span><span></span></span>`;

    // ── LINE 1: meal (violet) | sep1 | food (blue) | sep2 | water (cyan) ──
    const mealPills  = ADVICE_OPTS.filter(a=>a.group==='meal');
    const foodPills  = ADVICE_OPTS.filter(a=>a.group==='food');
    const waterPills = ADVICE_OPTS.filter(a=>a.group==='water');

    const mkBtn = (a, cls) => {
        const on = activeArr.includes(a.id);
        return `<button type="button" onclick="appendDrugAdvice(${itemId},'${a.id}')" title="${a.id}" class="ap ${cls}${on?' on':''}">${a.label}</button>`;
    };

    const line1 =
        mealPills.map(a=>mkBtn(a,'g-meal')).join('') +
        sep1 +
        foodPills.map(a=>mkBtn(a,'g-food')).join('') +
        sep2 +
        waterPills.map(a=>mkBtn(a,'g-water')).join('');

    // ── LINE 2: freq (teal) | sep1 | SOS STAT (red) | sep1 | MD SL (red) ──
    const freqPills   = ADVICE_OPTS.filter(a=>a.group==='freq');
    const urgentPills = ADVICE_OPTS.filter(a=>a.group==='urgent');
    // Split urgent: SOS+STAT | MD+SL
    const urgentA = urgentPills.slice(0,2); // SOS, STAT
    const urgentB = urgentPills.slice(2);   // MD, SL

    const line2 =
        freqPills.map(a=>mkBtn(a,'g-freq')).join('') +
        sep1 +
        urgentA.map(a=>mkBtn(a,'g-urgent')).join('') +
        sep1 +
        urgentB.map(a=>mkBtn(a,'g-urgent')).join('');

    return `
        <div class="pill-row">${line1}</div>
        <div class="pill-row">${line2}</div>
    `;
}

function renderRx(){
    // 1. MEMORIZE CURSOR FOCUS BEFORE REDRAWING
    const activeEl = document.activeElement;
    const activeId = activeEl ? activeEl.id : null;
    let cursorStart = null, cursorEnd = null;
    if (activeId && activeEl.tagName === 'INPUT') {
        cursorStart = activeEl.selectionStart;
        cursorEnd = activeEl.selectionEnd;
    }

    const cont=document.getElementById("rxList");
    const badge=document.getElementById("rxCount");
    
    if(!rxItems.length){
        cont.innerHTML=`<div class="py-10 flex flex-col items-center justify-center text-center opacity-50"><svg class="w-10 h-10 text-slate-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg><p class="text-slate-500 text-sm font-semibold">Prescription pad is empty.</p><p class="text-slate-400 text-xs mt-1">Search below to add medications.</p></div>`;
        badge.innerText="0 Meds";return;
    }
    
    cont.innerHTML="";
    badge.innerText=`${rxItems.length} Med${rxItems.length>1?'s':''}`;

    rxItems.forEach((item,idx)=>{
        let safeHTML=''; let overdose=false;
        const isCombo=item.strength.length>1||/[+&]/.test(String(item.molecule));
        if(!isCombo){
            const s=item.strength[0]||0, m=item.max?.[0]||0;
            let parsedDaily = 0;
            if(item.freqArr) {
                 parsedDaily = item.freqArr.reduce((sum, val) => {
                     let num = val.includes('/') ? (parseInt(val.split('/')[0]) / parseInt(val.split('/')[1])) : parseFloat(val);
                     return sum + (isNaN(num) ? 0 : num);
                 }, 0);
            }
            if(s>0 && m>0){
                const daily=parseFloat((parsedDaily*s).toFixed(2));
                overdose=daily>m;
                safeHTML=`<span class="safety-badge ${overdose?'safety-over':'safety-ok'}">${overdose?'⚠ OD':'✓ Safe'}<br>${daily}/${m}mg</span>`;
            }
        }

        let displayFreq = item.freqArr ? item.freqArr.join(' - ') : '0 - 0 - 0';
            if (item.isSos) displayFreq = `SOS`;
            if (item.isWeekly) {
                displayFreq = item.weeklyDay ? `Weekly (${item.weeklyDay})` : `Weekly`;
}

        const card=document.createElement('div');
        card.className=`rx-card${overdose?' is-overdose':''}`;
        card.innerHTML=`
            <div class="rx-sidebar" onclick="removeDrug(${item.id})" title="Remove drug">
                <div class="rx-sidebar-icon"><span></span><span></span><span></span></div>
            </div>

            <div class="rx-main">
                <div class="rx-header" style="display:flex; justify-content:space-between;">
                    <div style="display:flex; gap:10px;">
                        <div class="rx-num">${idx+1}</div>
                        <div class="rx-names">
                            <div class="rx-brand">${item.brand}</div>
                            <div class="rx-generic">${item.molecule}</div>
                        </div>
                    </div>
                    <div style="display:flex; gap:10px; text-align:right;">
                        ${safeHTML?`<div class="rx-safety" style="align-self:center;">${safeHTML}</div>`:''}
                        <div class="rx-maxdose">Max<br>${item.maxRaw}</div>
                    </div>
                </div>

                <div class="rx-controls" style="padding: 10px; background: #f8fafc; border-top: 1px solid #e2e8f0; display:flex; gap: 15px; align-items: center;">
                    <div style="flex: 1;">
                        <label style="font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; display:block; margin-bottom:4px;">Smart Command</label>
                        <input type="text" 
                               id="sig-${item.id}"
                               placeholder="e.g. 1bbf 1/2bd 30d cc-Avoid Curd" 
                               oninput="parseSmartSig(${item.id}, this.value)"
                               class="premium-input w-full"
                               style="padding: 8px 12px; font-size: 14px; font-weight: 700; color: #1e293b; border: 1px solid #cbd5e1; border-radius: 6px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);"
                               value="${item.rawSig || ''}" autocomplete="off">
                    </div>

                    <div style="min-width: 120px; text-align: right; border-left: 2px solid #e2e8f0; padding-left: 15px;">
                        <div style="font-size: 14px; font-weight: 900; color: #0f172a; letter-spacing: 1px;">
                            ${displayFreq}
                        </div>
                        <div style="font-size: 11px; font-weight: 600; color: #64748b; margin-top:2px;">
                            ${item.days ? item.days : '<span style="color:#cbd5e1;">Duration?</span>'}
                        </div>
                    </div>
                </div>
                
                ${(item.advice || item.customNote) ? `
                <div style="padding: 6px 10px; background: #fff; font-size: 11px; color: #475569; border-top: 1px dashed #cbd5e1; font-style: italic;">
                    ↳ ${[item.advice, item.customNote].filter(Boolean).join(' — ')}
                </div>
                ` : ''}
            </div>`;
        cont.appendChild(card);
    });

    // 2. RESTORE CURSOR FOCUS AFTER REDRAWING
    if (activeId) {
        const elToFocus = document.getElementById(activeId);
        if (elToFocus) {
            elToFocus.focus();
            try { elToFocus.setSelectionRange(cursorStart, cursorEnd); } catch(e){}
        }
    }
}

function removeDrug(id){rxItems=rxItems.filter(i=>i.id!==id);renderRx();}

function appendDrugAdvice(id,text){
    const item=rxItems.find(x=>x.id===id);
    if(item){
        let arr=item.advice?item.advice.split(',').map(s=>s.trim()).filter(Boolean):[];
        arr=arr.includes(text)?arr.filter(a=>a!==text):[...arr,text];
        item.advice=arr.join(', ');renderRx();
    }
}

}

function loadWorkspace(){
    const saved=localStorage.getItem('clinicalWorkspaceState');
    if(saved){
        try{
            const d=JSON.parse(saved);
            const s=(id,v)=>{if(v!==undefined&&document.getElementById(id))document.getElementById(id).value=v;};
            s('ptName',d.ptName);s('date',d.date);s('ptAge',d.ptAge);s('ptSex',d.ptSex);
            s('bpInput',d.bpInput);s('ptPulse',d.ptPulse);s('ptTemp',d.ptTemp);s('ptSpo2',d.ptSpo2);
            s('ptRS',d.ptRS);s('ptCVS',d.ptCVS);s('ptPA',d.ptPA);s('ptCNS',d.ptCNS);
            s('complaints',d.complaints);s('fuDays',d.fuDays);s('generalAdvice',d.generalAdvice);
            s('masterDays',d.masterDays);s('tDrug',d.tDrug);s('tDose',d.tDose);s('tFreq',d.tFreq);s('tDays',d.tDays);
            if(d.rxItems)rxItems=d.rxItems;if(d.tapers)tapers=d.tapers;if(d.currentTaperSteps)currentTaperSteps=d.currentTaperSteps;
            if(d.checkboxes){const cbs=document.querySelectorAll('input[type="checkbox"]');cbs.forEach((c,i)=>{if(d.checkboxes[i]!==undefined)c.checked=d.checkboxes[i];});}
        }catch(e){console.error(e);initDefaults();}
    }else{initDefaults();}
    renderRx();renderTaperBuilder();renderActiveTapers();
    setInterval(saveWorkspace,1000);
}

    // Left column sections — softer style with left border stripe

// ── SMART COMMAND LINE (QUICK ENTRY) & CARD SYNC ──────────
const qInput = document.getElementById('quickEntryInput');
const qBtn = document.getElementById('quickEntryBtn');
const qChips = document.getElementById('quickEntryChips');
const qCard = document.getElementById('quickEntryCard');
const qStatus = document.getElementById('quickEntryStatus');

// Sync the 3 Cards to open/close together
const detailCards = document.querySelectorAll('details.glass-card');
detailCards.forEach(card => {
    card.addEventListener('toggle', (e) => {
        if (card.dataset.syncing) return; // Prevent infinite loops
        const isOpen = card.open;
        detailCards.forEach(other => {
            if (other !== card && other.open !== isOpen) {
                other.dataset.syncing = 'true';
                other.open = isOpen;
                setTimeout(() => delete other.dataset.syncing, 10);
            }
        });
    });
});

const qSeq = [
    { key: 'name', label: 'Name' }, { key: 'age', label: 'Age' }, { key: 'sex', label: 'Sex' },
    { key: 'bp', label: 'BP' }, { key: 'hr', label: 'HR' }, { key: 'temp', label: 'Temp' },
    { key: 'rs', label: 'R/S' }, { key: 'cvs', label: 'CVS' }, { key: 'cns', label: 'CNS' },
    { key: 'pa', label: 'P/A' }, { key: 'kco', label: 'KCO' }, { key: 'co', label: 'C/O' }
];

function parseQuickEntry(str) {
    let raw = str.trim();
    let data = { name: [], age: '', sex: '', bp: '', hr: '', rs: '', cvs: '', cns: '', pa: '', temp: '', kco: [], co: '' };

    // 1. Extract Complaints (c/o-) first
    const coMatch = raw.match(/c\/o-(.+)/i);
    if (coMatch) {
        data.co = coMatch[1].trim();
        raw = raw.replace(coMatch[0], ''); 
    }

    // 2. Tokenize the rest
    const tokens = raw.trim().split(/\s+/);

    tokens.forEach(t => {
        if (!t) return;
        const tLow = t.toLowerCase();

        if (tLow === 'm' || tLow === 'f') {
            data.sex = tLow.toUpperCase();
        } else if (/^\d{2,3}\/\d{2,3}$/.test(t)) {
            data.bp = t;
        } else if (tLow.startsWith('rs-')) {
            const val = t.substring(3).replace(/-/g, ' ');
            data.rs = (val === 'n') ? 'B/L AE+, Clear' : val;
        } else if (tLow.startsWith('cvs-')) {
            const val = t.substring(4).replace(/-/g, ' ');
            data.cvs = (val === 'n') ? 'S1S2+, No Murmur' : val;
        } else if (tLow.startsWith('pa-')) {
            const val = t.substring(3).replace(/-/g, ' ');
            data.pa = (val === 'n') ? 'Soft, NT' : val;
        } else if (tLow.startsWith('cns-')) {
            const val = t.substring(4).replace(/-/g, ' ');
            data.cns = (val === 'n') ? 'Conscious, Oriented' : val;
        } else if (tLow.startsWith('t-')) {
            const val = t.substring(2).replace(/-/g, ' ');
            data.temp = (val === 'n') ? 'Afebrile' : val;
        } else if (tLow.startsWith('kco-')) {
            // FIX: Prevent empty strings from selecting all pills
            data.kco = tLow.substring(4).split(',').filter(k => k.trim() !== '');
        } else if (/^\d+$/.test(t)) {
            const num = parseInt(t, 10);
            if (num >= 1 && num <= 120 && !data.age) data.age = num.toString();
            else if (num >= 50 && num <= 200 && !data.hr) data.hr = num.toString();
        } else if (/^[a-zA-Z]+$/.test(t)) {
            data.name.push(t.charAt(0).toUpperCase() + t.slice(1).toLowerCase());
        }
    });
    
    data.name = data.name.join(' ');
    return data;
}

function renderQuickChips(data) {
    let nextFound = false;
    qChips.innerHTML = qSeq.map(item => {
        const val = item.key === 'kco' && data.kco.length ? data.kco.join(', ') : data[item.key];
        if (val) {
            return `<span class="px-2.5 py-1 text-[10px] font-bold uppercase tracking-widest rounded-lg border bg-emerald-100 text-emerald-700 border-emerald-300 shadow-sm transition-all">✓ ${item.label}: <span class="text-emerald-900">${val}</span></span>`;
        } else if (!nextFound) {
            nextFound = true;
            return `<span class="px-2.5 py-1 text-[10px] font-bold uppercase tracking-widest rounded-lg border bg-indigo-50 text-indigo-600 border-indigo-300 animate-pulse shadow-sm transition-all">${item.label}</span>`;
        } else {
            return `<span class="px-2.5 py-1 text-[10px] font-bold uppercase tracking-widest rounded-lg border bg-slate-100 text-slate-400 border-slate-200 transition-all">${item.label}</span>`;
        }
    }).join('');
}

function executeQuickFill() {
    if (!qInput.value.trim()) return;
    const data = parseQuickEntry(qInput.value);
    
    if (data.name) document.getElementById('ptName').value = data.name;
    if (data.age) document.getElementById('ptAge').value = data.age;
    if (data.sex) document.getElementById('ptSex').value = data.sex;
    if (data.bp) document.getElementById('bpInput').value = data.bp;
    if (data.hr) document.getElementById('ptPulse').value = data.hr;
    if (data.temp) document.getElementById('ptTemp').value = data.temp;
    if (data.rs) document.getElementById('ptRS').value = data.rs;
    if (data.cvs) document.getElementById('ptCVS').value = data.cvs;
    if (data.cns) document.getElementById('ptCNS').value = data.cns;
    if (data.pa) document.getElementById('ptPA').value = data.pa;
    if (data.co) document.getElementById('complaints').value = data.co;

    if (data.kco.length > 0) {
        const checkboxes = document.querySelectorAll('#kcoSection input[type="checkbox"]');
        checkboxes.forEach(chk => {
            const lbl = chk.nextElementSibling.innerText.toLowerCase();
            if (data.kco.some(k => lbl.includes(k.toLowerCase().trim()))) {
                chk.checked = true;
            }
        });
    }

    qCard.classList.remove('border-l-indigo-500');
    qCard.classList.add('border-l-emerald-500', 'bg-emerald-50/30');
    qStatus.classList.remove('hidden');
    
    setTimeout(() => {
        qCard.classList.add('border-l-indigo-500');
        qCard.classList.remove('border-l-emerald-500', 'bg-emerald-50/30');
        qStatus.classList.add('hidden');
    }, 2000);

    qInput.value = '';
    renderQuickChips(parseQuickEntry(''));
    if (typeof saveWorkspace === 'function') saveWorkspace();
}

qInput.addEventListener('input', () => renderQuickChips(parseQuickEntry(qInput.value)));
qInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); executeQuickFill(); }});
qBtn.addEventListener('click', executeQuickFill);

renderQuickChips(parseQuickEntry(''));

// ── SMART FOLLOW-UP ENGINE ────────────────────────────────
const fuSmartInput = document.getElementById('fuSmartInput');
const fuSmartChips = document.getElementById('fuSmartChips');
const fuDays = document.getElementById('fuDays');
const fuHiddenBoxes = document.getElementById('fuHiddenBoxes');

fuSmartInput.addEventListener('input', () => {
    // Remove "fu " or "fu with " prefixes if the user typed them
    let val = fuSmartInput.value.toLowerCase().replace(/^fu\s+with\s+/i, '').replace(/^fu\s+/i, '').trim();
    let days = '';
    let durationLabel = '';

    // Extract time (e.g. 3m, 7d, 6w) and convert to total days for the print layout
    const timeMatch = val.match(/(\d+)\s*([dwmy])/i);
    if (timeMatch) {
        const num = parseInt(timeMatch[1], 10);
        const unit = timeMatch[2].toLowerCase();
        if (unit === 'd') { days = num; durationLabel = num + ' Days'; }
        if (unit === 'w') { days = num * 7; durationLabel = num + ' Weeks'; }
        if (unit === 'm') { days = num * 30; durationLabel = num + ' Months'; }
        if (unit === 'y') { days = num * 365; durationLabel = num + ' Years'; }
        
        // Remove the time from the test list
        val = val.replace(timeMatch[0], '').replace(/,/g, ' ').replace(/\s+/g, ' ').trim();
    }

    // Set the hidden days input so print layout sees it (e.g. outputs "in 90 days")
    fuDays.value = days;

    // Split remaining words into test names
    let tests = val.split(/[\s,]+/).filter(Boolean);

    // Render visible chips
    let chipsHtml = tests.map(t => `<span class="px-2.5 py-1 bg-purple-100 text-purple-700 rounded-md text-[10px] font-bold uppercase border border-purple-200 shadow-sm">${t}</span>`).join('');
    
    if (durationLabel) {
        chipsHtml += `<span class="px-2.5 py-1 bg-amber-100 text-amber-800 rounded-md text-[10px] font-bold uppercase border border-amber-300 shadow-sm">⏱ ${durationLabel}</span>`;
    }
    fuSmartChips.innerHTML = chipsHtml;

    // Render hidden checkboxes so the Print Logic can find them
    fuHiddenBoxes.innerHTML = tests.map(t => `<input type="checkbox" checked><span>${t.toUpperCase()}</span>`).join('');
    
    if (typeof saveWorkspace === 'function') saveWorkspace();
});

// ── SMART SIG ENGINE ───────────────────────────────────────
function parseSmartSig(id, val) {
    const item = rxItems.find(x => x.id === id);
    if (!item) return;

    item.rawSig = val;
    let workingStr = val.trim();
    
    item.customNote = '';
    item.days = ''; // Will now store the fully formatted string (e.g., "1 Month")

    // 1. Extract cc- (Custom Note)
    const ccIndex = workingStr.toLowerCase().indexOf('cc-');
    if (ccIndex !== -1) {
        item.customNote = workingStr.substring(ccIndex + 3).trim();
        workingStr = workingStr.substring(0, ccIndex).trim(); 
    }

    // 2. Extract Duration (Days, Weeks, Months)
    // Matches: 5d, 5 days, 2w, 2 wks, 1m, 3 months
    const durationMatch = workingStr.match(/(\d+)\s*(d|days?|w|wks?|weeks?|m|mos?|months?)\b/i);
    if (durationMatch) {
        let num = parseInt(durationMatch[1]);
        let rawUnit = durationMatch[2].toLowerCase();
        let unit = "Days";
        
        if (rawUnit.startsWith('m')) unit = num === 1 ? "Month" : "Months";
        else if (rawUnit.startsWith('w')) unit = num === 1 ? "Week" : "Weeks";
        else unit = num === 1 ? "Day" : "Days";
        
        item.days = `${num} ${unit}`; // Stores as "1 Month", "2 Weeks", etc.
        workingStr = workingStr.replace(durationMatch[0], '').trim(); 
    }

    // 3. Tokenize remaining string
    let tokens = workingStr.toLowerCase().split(/\s+/);
    
    const adviceMap = {
        'af': 'After Food', 'es': 'Empty Stomach', 'sl': 'Sublingual',
        'md': 'Mouth Dissolving (Do not swallow)', 'hgw': '+ Half glass water',
        '1lw': '+ 1 Liter water', 'ad': 'Alternate Day', 'stat': 'STAT - Take Immediately',
        'bbf': 'Before Breakfast', 'bl': 'Before Lunch', 'bd': 'Before Dinner'
    };

    const slotMap = { 'bbf': 0, 'm': 0, 'bl': 1, 'an': 1, 'bd': 2, 'n': 2 };

    let newFreq = ["0", "0", "0"];
    let selectedAdvice = [];
    item.isSos = false;
    item.isWeekly = false;
    item.weeklyDay = '';
    
    let currentDose = "1";

    tokens.forEach(t => {
        if (!t) return;
        
        if (t === 'sos') { item.isSos = true; return; }
        if (t === 'wo') { item.isWeekly = true; return; }
        if (['sun','mon','tue','wed','thu','fri','sat'].includes(t)) {
            item.weeklyDay = t.charAt(0).toUpperCase() + t.slice(1);
            return;
        }
        if (t === 'tds') { newFreq = [currentDose, currentDose, currentDose]; return; }
        if (t === 'bid') { newFreq = [currentDose, "0", currentDose]; return; }
        if (t === 'od') { newFreq = [currentDose, "0", "0"]; return; }

        if (t.includes('-') && /\d/.test(t)) {
            let parts = t.split('-');
            if (parts.length >= 3) newFreq = [parts[0], parts[1], parts[2]];
            else if (parts.length === 2) newFreq = [parts[0], "0", parts[1]];
            return;
        }

        const doseMatch = t.match(/^([\d\.\/]+(?:tsf|ml|drop)?)$/);
        if (doseMatch) {
            currentDose = doseMatch[1].toUpperCase(); 
            return;
        }

        const compMatch = t.match(/^([\d\.\/]+(?:tsf|ml|drop)?)?([a-z]+)$/);
        if (compMatch) {
            let dose = compMatch[1] ? compMatch[1].toUpperCase() : currentDose;
            let code = compMatch[2];
            
            if (slotMap[code] !== undefined) {
                newFreq[slotMap[code]] = dose;
                if (adviceMap[code]) selectedAdvice.push(adviceMap[code]);
            } else if (adviceMap[code]) {
                selectedAdvice.push(adviceMap[code]);
            }
        }
    });

    if ((item.isSos || item.isWeekly) && newFreq.every(f => f === "0")) newFreq[0] = currentDose; 

    item.freqArr = newFreq;
      // --- NEW SORTING & CONSOLIDATION LOGIC ---
    let uniqueAdvice = [...new Set(selectedAdvice)];
    
    const hasBBF = uniqueAdvice.includes('Before Breakfast');
    const hasBL = uniqueAdvice.includes('Before Lunch');
    const hasBD = uniqueAdvice.includes('Before Dinner');
    
    // 1. Consolidate if all 3 meals are present
    if (hasBBF && hasBL && hasBD) {
        uniqueAdvice = uniqueAdvice.filter(a => !['Before Breakfast', 'Before Lunch', 'Before Dinner'].includes(a));
        uniqueAdvice.unshift('Before Meals'); // Add consolidated term to the front
    } else {
        // 2. Otherwise, enforce chronological order (Morning -> Noon -> Night)
        const logicalOrder = ['Empty Stomach', 'Before Breakfast', 'Before Lunch', 'Before Dinner', 'After Food'];
        uniqueAdvice.sort((a, b) => {
            let idxA = logicalOrder.indexOf(a);
            let idxB = logicalOrder.indexOf(b);
            idxA = idxA === -1 ? 99 : idxA;
            idxB = idxB === -1 ? 99 : idxB;
            return idxA - idxB;
        });
    }

    item.freqArr = newFreq;
    item.advice = uniqueAdvice.join(', ');
    
    renderRx();
    if (typeof saveWorkspace === 'function') saveWorkspace();
}
