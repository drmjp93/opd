<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="black"/><text x="50" y="70" font-size="80" fill="white" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle">O</text></svg>'>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 900: '#312e81' } },

    <style>
        body { background-color: #f8fafc; overflow-y: auto; overflow-x: hidden; }
        .glass-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border: 1px solid rgba(226,232,240,0.8); border-radius: 16px; box-shadow: 0 4px 20px -2px rgba(0,0,0,0.03); }
        .premium-input { width: 100%; background: #f1f5f9; border: 1px solid transparent; border-radius: 8px; padding: 8px 12px; font-size: 0.85rem; font-weight: 500; color: #1e293b; transition: all 0.2s ease; }
        .premium-input:focus { background: #fff; border-color: #6366f1; outline: none; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        .premium-input::placeholder { color: #94a3b8; font-weight: 400; }
        .input-label { display: block; font-size: 0.65rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; margin-left: 2px; }
        .check-pill input { display: none; }
        .check-pill span { display: inline-block; padding: 3px 10px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 20px; font-size: 0.7rem; font-weight: 600; color: #64748b; cursor: pointer; transition: 0.2s; user-select: none; }
        .check-pill input:checked + span { background: #e0e7ff; border-color: #6366f1; color: #4f46e5; }
        .advice-pill { padding: 4px 12px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 20px; font-size: 0.75rem; font-weight: 600; color: #64748b; cursor: pointer; transition: 0.2s; }
        .advice-pill:hover { background: #ccfbf1; border-color: #14b8a6; color: #0f766e; }
        .scroll-pane::-webkit-scrollbar { width: 5px; }
        .scroll-pane::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .scroll-pane::-webkit-scrollbar-track { background: transparent; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .search-item-active { background-color: #e0e7ff !important; border-left: 4px solid #4f46e5; }
        .inline-search-container { position: relative; margin-top: 10px; }
        .inline-search-input { width: 100%; background: white; border: 2px dashed #cbd5e1; border-radius: 12px; padding: 12px 16px 12px 40px; font-size: 1rem; font-weight: 600; color: #1e293b; transition: all 0.2s ease; }
        .inline-search-input:focus { border-color: #4f46e5; border-style: solid; outline: none; box-shadow: 0 4px 20px -2px rgba(79,70,229,0.15); }
        .inline-search-icon { position: absolute; left: 14px; top: 14px; color: #94a3b8; }

    /* ── DRUG CARD ── */
    .rx-card {
        background: #fff;
        border-radius: 10px;
        border: 1px solid #e4e9f2;
        box-shadow: 0 1px 4px rgba(15,23,42,0.04);
        overflow: hidden;
        display: flex;
        contain: layout style;
    }
    .rx-card:hover { box-shadow: 0 4px 16px rgba(79,70,229,0.1); border-color: #c7d2fe; }
    .rx-card.is-overdose { border-color: #fca5a5 !important; }

    .rx-sidebar {
        flex-shrink: 0; width: 28px; background: #f8fafc;
        border-right: 1px solid #eef0f6; display: flex;
        align-items: center; justify-content: center;
        cursor: pointer; transition: background 0.12s;
    }
    .rx-sidebar:hover { background: #fee2e2; }
    .rx-sidebar:hover .rx-sidebar-icon { color: #ef4444; }
    .rx-sidebar-icon { color: #d1d5db; transition: color 0.12s; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .rx-sidebar-icon span { display: block; width: 3px; height: 3px; border-radius: 50%; background: currentColor; }

    .rx-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }

    .rx-header {
        display: flex; align-items: flex-start; gap: 8px;
        padding: 9px 12px 8px 10px;
        background: linear-gradient(to right, #fafaff, #fff);
        border-bottom: 1px solid #f0f3fa;
    }
    .rx-num {
        flex-shrink: 0; min-width: 22px; height: 22px; padding: 0 4px;
        border-radius: 5px; background: #4f46e5; color: #fff;
        font-size: 10px; font-weight: 900;
        display: flex; align-items: center; justify-content: center; margin-top: 1px;
    }
    .rx-card.is-overdose .rx-num { background: #ef4444; }
    .rx-names { flex: 1; min-width: 0; }
    .rx-brand { font-size: 13px; font-weight: 800; color: #0f172a; line-height: 1.25; word-break: break-word; }
    .rx-generic { font-size: 10.5px; font-weight: 500; color: #64748b; font-style: italic; line-height: 1.4; margin-top: 1px; word-break: break-word; }
    .rx-maxdose {
        flex-shrink: 0; font-size: 8.5px; font-weight: 700; color: #94a3b8;
        background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 5px;
        padding: 2px 6px; white-space: nowrap; align-self: flex-start;
        margin-top: 2px; text-align: right; line-height: 1.5;
    }
    .safety-badge { font-size: 8.5px; font-weight: 800; padding: 3px 6px; border-radius: 5px; letter-spacing: 0.03em; white-space: nowrap; }
    .safety-ok   { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
    .safety-over { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }



    /* Auto-hiding Advice Card */
    #advice-card {
      max-height: 55px; /* Adjust this so ONLY the title shows */
      overflow: hidden;
      transition: max-height 0.4s ease-in-out;
      cursor: pointer;
    }

    /* Expands on hover, AND stays open if you are typing inside it */
    #advice-card:hover,
    #advice-card:focus-within {
      max-height: 1000px; /* Large enough to fit all content */
      cursor: default;
    }
    
    /* Optional: Add a visual hint that it expands */
    #advice-card h3::after {
      content: ' (Hover to expand)';
      font-size: 0.75rem;
      color: #94a3b8;
      font-weight: normal;
    }
    #advice-card:hover h3::after,
    #advice-card:focus-within h3::after {
      content: ''; /* Hides hint when open */
    }





    /* ── PRINT ── */
    @media print {
        @page { size: A4; margin: 5mm; }
        body { background: white; overflow-y: visible; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        #screen-layout { display: none !important; }
        #lock-screen   { display: none !important; }
        #print-layout  {
            display: block !important; width: 100%; color: black;
            font-family: 'Inter', sans-serif;
            padding-top: 35mm !important;
            padding-left: 12mm !important;
            padding-right: 10mm !important;
        }
        /* Software Credit Footer */


      .print-software-credit { 

        margin-top: 50px; 
        text-align: center; 
        font-size: 8pt;
        color: #94a3b8; 
        font-family: Arial, sans-serif;
      }

    }
    @media screen { #print-layout { display: none; } }
</style>

                <div class="w-8 h-8 rounded-lg bg-brand-600 flex items-center justify-center text-white shadow-md">

<!-- SMART COMMAND LINE -->
 
<div class="max-w-[1600px] mx-auto mb-3 w-full">
    <div class="glass-card px-4 py-2 border-l-4 border-l-indigo-500 shadow-sm transition-all flex flex-col justify-center" id="quickEntryCard">
        <div class="relative flex gap-2 items-center">
            
            <div class="relative flex-1">
                <input type="text" id="quickEntryInput" class="inline-search-input !py-2 !pl-9 !pr-4 !text-sm !font-semibold !border-solid !border-2 !border-slate-300 focus:!border-indigo-500 w-full shadow-sm" placeholder="e.g. Ramila 45 f 130/80 88 rs-n cvs-n t-n kco-dm,htn c/o-fever and cough" autocomplete="off">

<main class="max-w-[1600px] mx-auto w-full flex flex-col gap-4">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 w-full">

        <details class="glass-card group bg-white/90 shadow-sm z-50 hidden">
            <summary class="p-3 font-bold text-slate-800 cursor-pointer flex justify-between items-center list-none outline-none">
                <span class="flex items-center gap-2 text-sm"><span class="w-2 h-2 rounded-full bg-brand-500"></span> 1. Demographics & Vitals</span>
                <svg class="w-4 h-4 text-slate-400 transition-transform group-open:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </summary>
            <div class="p-4 pt-0 space-y-3 border-t border-slate-100 mt-2 ">
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="input-label">Date</label><input type="date" id="date" class="premium-input !px-2"></div>
                    <div><label class="input-label">Sex</label><select id="ptSex" class="premium-input !px-2"><option>M</option><option>F</option></select></div>
                </div>
                <div class="grid grid-cols-[1fr_80px] gap-2">
                    <div><label class="input-label">Patient Name</label><input type="text" id="ptName" placeholder="Full Name" class="premium-input font-bold" oninput="this.value=this.value.toUpperCase()"></div>
                    <div><label class="input-label">Age</label><input type="number" id="ptAge" placeholder="Yrs" class="premium-input text-center"></div>
                </div>
                <div class="grid grid-cols-4 gap-2">
                    <div><label class="input-label">BP</label><input type="text" id="bpInput" placeholder="120/80" class="premium-input !px-1 text-center"></div>
                    <div><label class="input-label">HR</label><input type="number" id="ptPulse" placeholder="72" class="premium-input !px-1 text-center"></div>
                    <div><label class="input-label">Temp</label><input type="text" id="ptTemp" placeholder="98.6 F" class="premium-input !px-1 text-center"></div>
                    <div><label class="input-label">SpO2</label><input type="text" id="ptSpo2" value="98% with RA" class="premium-input !px-1 text-center"></div>
                </div>
                <div class="grid grid-cols-4 gap-2">
                    <div><label class="input-label">R/S</label><input type="text" id="ptRS" class="premium-input !px-1 text-center"></div>
                    <div><label class="input-label">CVS</label><input type="text" id="ptCVS" class="premium-input !px-1 text-center"></div>
                    <div><label class="input-label">P/A</label><input type="text" id="ptPA" placeholder="Blank" class="premium-input !px-1 text-center"></div>
                    <div><label class="input-label">CNS</label><input type="text" id="ptCNS" placeholder="Blank" class="premium-input !px-1 text-center"></div>
                </div>
            </div>
        </details>

        <details class="glass-card group bg-white/90 shadow-sm z-50 hidden" id="kcoSection">
            <summary class="p-3 font-bold text-slate-800 cursor-pointer flex justify-between items-center list-none outline-none">
                <span class="flex items-center gap-2 text-sm"><span class="w-2 h-2 rounded-full bg-rose-500"></span> 2. KCO</span>
                <svg class="w-4 h-4 text-slate-400 transition-transform group-open:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </summary>
            <div class="p-4 pt-0 border-t border-slate-100 mt-2 flex flex-wrap gap-2">
                <label class="check-pill"><input type="checkbox"><span>DM</span></label>
                <label class="check-pill"><input type="checkbox"><span>HTN</span></label>
                <label class="check-pill"><input type="checkbox"><span>IHD</span></label>
                <label class="check-pill"><input type="checkbox"><span>S/P CABG</span></label>
                <label class="check-pill"><input type="checkbox"><span>S/P PTCA</span></label>
                <label class="check-pill"><input type="checkbox"><span>Asthma</span></label>
                <label class="check-pill"><input type="checkbox"><span>COPD</span></label>
                <label class="check-pill"><input type="checkbox"><span>CKD</span></label>
                <label class="check-pill"><input type="checkbox"><span>Epilepsy</span></label>
                <label class="check-pill"><input type="checkbox"><span>Psychiatric Disorder</span></label>
                <label class="check-pill"><input type="checkbox"><span>RA</span></label>
                <label class="check-pill"><input type="checkbox"><span>PIH</span></label>
                <label class="check-pill"><input type="checkbox"><span>GDM</span></label>
                <label class="check-pill"><input type="checkbox"><span>Hyperthyroid</span></label>
                <label class="check-pill"><input type="checkbox"><span>Hypothyroid</span></label>
            </div>
        </details>

        <details class="glass-card group bg-white/90 shadow-sm z-50 hidden">
            <summary class="p-3 font-bold text-slate-800 cursor-pointer flex justify-between items-center list-none outline-none">
                <span class="flex items-center gap-2 text-sm"><span class="w-2 h-2 rounded-full bg-amber-500"></span> 3. Clinical Note</span>
                <svg class="w-4 h-4 text-slate-400 transition-transform group-open:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </summary>
            <div class="p-4 pt-0 border-t border-slate-100 mt-2">
                <textarea id="complaints" class="premium-input w-full h-32 resize-none" placeholder="Patient complaints..."></textarea>
            </div>
        </details>

                    <button onclick="applyTemplate('uti')" class="whitespace-nowrap px-3 py-1 bg-emerald-50 border border-emerald-200 rounded-full text-[10px] font-bold text-emerald-700 hover:bg-emerald-500 hover:text-white transition-all shadow-sm">UTI Protocol</button>
                    <button onclick="applyTemplate('viral_urti_pregnancy')" class="whitespace-nowrap px-3 py-1 bg-emerald-50 border border-emerald-200 rounded-full text-[10px] font-bold text-emerald-700 hover:bg-emerald-500 hover:text-white transition-all shadow-sm">URTI (Preg)</button>

        </div>

                    Advice & Instructions
                </h3>
                <div class="space-y-3 mb-3">
                    <div class="flex flex-wrap gap-1.5 items-center">
                        <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mr-1">Diet:</span>
                        <button onclick="addAdvice('Low Fat Diet (LFD)')" class="advice-pill !bg-emerald-50 !text-emerald-700 !border-emerald-200 !px-2 !py-1 !text-[10px]">LFD</button>
                        <button onclick="addAdvice('Bland Diet')" class="advice-pill !bg-emerald-50 !text-emerald-700 !border-emerald-200 !px-2 !py-1 !text-[10px]">Bland</button>
                        <button onclick="addAdvice('Soft Diet')" class="advice-pill !bg-emerald-50 !text-emerald-700 !border-emerald-200 !px-2 !py-1 !text-[10px]">Soft</button>
                        <button onclick="addAdvice('Salt restricted diet')" class="advice-pill !bg-emerald-50 !text-emerald-700 !border-emerald-200 !px-2 !py-1 !text-[10px]">SRD</button>
                        <button onclick="addAdvice('Anti Diabetic Diet')" class="advice-pill !bg-emerald-50 !text-emerald-700 !border-emerald-200 !px-2 !py-1 !text-[10px]">ADD</button>
                        <button onclick="addAdvice('Strictly avoid fruit juice')" class="advice-pill !bg-emerald-50 !text-emerald-700 !border-emerald-200 !px-2 !py-1 !text-[10px]">No Juice</button>
                        <button onclick="addAdvice('Strictly avoid coconut water')" class="advice-pill !bg-emerald-50 !text-emerald-700 !border-emerald-200 !px-2 !py-1 !text-[10px]">No Coconut Water</button>
                    </div>
                    <div class="flex flex-wrap gap-1.5 items-center">
                        <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mr-1">General:</span>
                        <button onclick="addAdvice('Strict Rest')" class="advice-pill !bg-sky-50 !text-sky-700 !border-sky-200 !px-2 !py-1 !text-[10px]">Rest</button>
                        <button onclick="addAdvice('Plenty of oral fluids')" class="advice-pill !bg-sky-50 !text-sky-700 !border-sky-200 !px-2 !py-1 !text-[10px]">Hydration</button>
                        <button onclick="addAdvice('Warm saline gargles')" class="advice-pill !bg-sky-50 !text-sky-700 !border-sky-200 !px-2 !py-1 !text-[10px]">Gargles</button>
                        <button onclick="addAdvice('Steam inhalation BID')" class="advice-pill !bg-sky-50 !text-sky-700 !border-sky-200 !px-2 !py-1 !text-[10px]">Steam</button>
                        <button onclick="addAdvice('Use Mask')" class="advice-pill !bg-sky-50 !text-sky-700 !border-sky-200 !px-2 !py-1 !text-[10px]">Use Mask</button>
                    </div>
                    <div class="flex flex-wrap gap-1.5 items-center">

<script>
// ══════════════════════════════════════════
// LOCK
// ══════════════════════════════════════════
let keyBuffer = "";
const TARGET = 1570014;
function hashCode(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; }
    return h;
}
if (sessionStorage.getItem('clinical_unlocked') !== 'true') {
    document.getElementById('screen-layout').style.display = 'none';
    document.getElementById('lock-screen').style.display = 'flex';
    window.addEventListener('keydown', function L(e) {
        if (e.key.length === 1) {
            keyBuffer += e.key;
            if (keyBuffer.length > 4) keyBuffer = keyBuffer.slice(-4);
            if (hashCode(keyBuffer) === TARGET) {
                sessionStorage.setItem('clinical_unlocked', 'true');
                document.getElementById('lock-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('lock-screen').style.display = 'none';
                    document.getElementById('screen-layout').style.display = 'block';
                    document.getElementById("ptName")?.focus();
                }, 500);
                window.removeEventListener('keydown', L);
            }
        }
    });
} else {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('screen-layout').style.display = 'block';
}

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let drugs = [], rxItems = [], currentSearchFocus = -1, tapers = [], currentTaperSteps = [];

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function extractDose(text) {
    if (!text) return [0];
    const str = String(text).toUpperCase();
    return str.split(/\s*(?:\+|&)\s*/).map(p => {
        let m;
        if ((m = p.match(/(\d+(?:\.\d+)?)\s*(?:G|GM)\b/))) return +m[1] * 1000;
        if ((m = p.match(/(\d+(?:\.\d+)?)\s*MG\b/))) return +m[1];
        if ((m = p.match(/(\d+(?:\.\d+)?)\s*MCG\b/))) return +m[1] / 1000;
        if ((m = p.match(/(\d+(?:\.\d+)?)\s*(?:IU|ML)\b/))) return +m[1];
        if ((m = p.match(/(\d+(?:\.\d+)?)/))) return +m[1];
        return 0;
    });
}

// ══════════════════════════════════════════
// DRUG SEARCH
// ══════════════════════════════════════════
const srchInput = document.getElementById("drugSearch");
const netlifyAPI = "https://drugs.drmjp93.workers.dev";
let searchDebounce;

srchInput.addEventListener("keydown", e => {
    const rd = document.getElementById("results");
    if (!rd || rd.classList.contains("hidden")) return;
    const items = rd.getElementsByClassName("search-item");
    if (!items.length) return;
    if (e.key === "ArrowDown") { currentSearchFocus++; activateSearchItem(items); e.preventDefault(); }
    else if (e.key === "ArrowUp") { currentSearchFocus--; activateSearchItem(items); e.preventDefault(); }
    else if (e.key === "Enter") { e.preventDefault(); (currentSearchFocus > -1 ? items[currentSearchFocus] : items[0]).click(); }
});

function activateSearchItem(items) {
    Array.from(items).forEach(i => i.classList.remove("search-item-active"));
    if (currentSearchFocus >= items.length) currentSearchFocus = 0;
    if (currentSearchFocus < 0) currentSearchFocus = items.length - 1;
    items[currentSearchFocus].classList.add("search-item-active");
    items[currentSearchFocus].scrollIntoView({ block: "nearest", behavior: "smooth" });
}

srchInput.addEventListener("input", function () {
    const q = this.value.toLowerCase().trim();
    const rd = document.getElementById("results");
    currentSearchFocus = -1;
    if (q.length < 2) { rd.classList.add("hidden"); return; }
    rd.innerHTML = `<div class="p-3 text-center text-xs font-semibold text-slate-400">Searching...</div>`;
    rd.classList.remove("hidden");
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(async () => {
        try {
            const response = await fetch(`${netlifyAPI}?q=${encodeURIComponent(q)}`);
            const matches = await response.json();
            renderResults(matches);
            setTimeout(() => document.querySelector('.inline-search-container').scrollIntoView({ behavior: 'smooth', block: 'center' }), 50);
        } catch (error) {
            rd.innerHTML = `<div class="p-3 text-center text-xs text-red-500 font-semibold">Error connecting to database.</div>`;
        }
    }, 250);
});

function renderResults(list) {
    const rd = document.getElementById("results");
    rd.innerHTML = "";
    if (!list.length) {
        rd.innerHTML = `<div class="p-3 text-center text-xs font-semibold text-slate-400">No molecules found</div>`;
        rd.classList.remove("hidden");
        return;
    }
    rd.classList.remove("hidden");
    list.forEach(d => {
        const item = document.createElement("div");
        item.className = "search-item p-3 hover:bg-brand-50 cursor-pointer flex justify-between items-center transition-colors";
        item.innerHTML = `<div><div class="font-bold text-sm text-slate-900">${d["FIRST BRAND"]}</div><div class="text-[10px] text-slate-500 font-bold mt-0.5"><i>(${d.Active_Content})</i></div></div><div class="text-[9px] bg-slate-100 text-slate-600 px-2 py-1 rounded font-bold uppercase tracking-wider text-right">Max:<br>${d.Max_Dose_Adult || 'N/A'}</div>`;
        item.onclick = () => {
            addDrug(d);
            srchInput.value = "";
            rd.classList.add("hidden");
            srchInput.focus();


            
            setTimeout(() => {
    const lastItem = rxItems[rxItems.length - 1];
    const sigEl = document.getElementById(`sig-${lastItem.id}`);
    if (sigEl) {
        sigEl.focus();
        sigEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}, 50);

            
        };
        rd.appendChild(item);
    });
}

document.addEventListener('click', e => {
    if (!srchInput.contains(e.target) && !document.getElementById('results').contains(e.target))
        document.getElementById('results').classList.add('hidden');
});

// ══════════════════════════════════════════
// TAPER ENGINE
// ══════════════════════════════════════════
function addTaperStep() {
    const dose = document.getElementById('tDose').value.trim();
    const freq = document.getElementById('tFreq').value.trim();
    const days = document.getElementById('tDays').value.trim();
    if (!dose || !freq || !days) { alert("Fill Dose, Freq, Days."); return; }
    currentTaperSteps.push({ dose, freq, days });
    document.getElementById('tDose').value = '';
    document.getElementById('tDays').value = '';
    document.getElementById('tDose').focus();
    renderTaperBuilder();
}

function removeTaperStep(i) { currentTaperSteps.splice(i, 1); renderTaperBuilder(); }

function renderTaperBuilder() {
    const c = document.getElementById('taperPreview');
    if (!currentTaperSteps.length) {
        c.innerHTML = '<span class="text-[10px] text-slate-400 italic font-medium">Add steps below to build taper...</span>';
        return;
    }
    c.innerHTML = currentTaperSteps.map((s, i) =>
        `<span class="inline-flex items-center gap-1 bg-rose-100 text-rose-800 px-2 py-1 rounded text-[10px] font-bold border border-rose-200">${s.dose} (${s.freq}) x ${s.days}d<button type="button" onclick="removeTaperStep(${i})" class="ml-1 text-rose-500 hover:text-rose-800">&times;</button></span>`
    ).join('<span class="text-slate-400 text-xs font-bold mx-0.5">➔</span>') +
        '<span class="text-slate-400 text-xs font-bold mx-0.5">➔</span><span class="inline-flex items-center bg-slate-200 text-slate-600 px-2 py-1 rounded text-[10px] font-bold">STOP</span>';
}

function saveTaperProtocol() {
    const drug = document.getElementById('tDrug').value.trim();
    if (!drug) return alert("Enter Drug Name.");
    if (!currentTaperSteps.length) return alert("Add at least one step.");
    tapers.push({ id: Date.now(), drug, steps: [...currentTaperSteps] });
    document.getElementById('tDrug').value = '';
    currentTaperSteps = [];
    renderTaperBuilder();
    renderActiveTapers();
}

function deleteTaperProtocol(id) { tapers = tapers.filter(t => t.id !== id); renderActiveTapers(); }

function renderActiveTapers() {
    const c = document.getElementById('activeTapers');
    if (!tapers.length) { c.innerHTML = ''; return; }
    c.innerHTML = tapers.map(t =>
        `<div class="bg-white border border-rose-200 rounded-lg p-2.5 flex justify-between items-center shadow-sm">
            <div>
                <h4 class="text-xs font-bold text-slate-900">${t.drug}</h4>
                <p class="text-[10px] font-bold text-rose-600 mt-0.5">${t.steps.map(s => `${s.dose} (${s.freq}) x ${s.days}d`).join(' ➔ ')} ➔ STOP</p>
            </div>
            <button type="button" onclick="deleteTaperProtocol(${t.id})" class="text-slate-300 hover:text-red-500 bg-slate-50 p-1.5 rounded">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
        </div>`
    ).join('');
}

// ══════════════════════════════════════════
// RX: ADD / REMOVE
// ══════════════════════════════════════════
function normalizeDays(val) {
    // Always return a display string like "5 Days", "1 Month"
    if (typeof val === 'string' && /[a-zA-Z]/.test(val)) return val; // already formatted
    const n = parseInt(val) || 5;
    return n === 1 ? '1 Day' : `${n} Days`;
}

function setGlobalDays(val) {
    const n = parseInt(val) || 1;
    const str = normalizeDays(n);
    rxItems.forEach(i => i.days = str);
    renderRx();
}

function addDrug(d) {
    const days = normalizeDays(parseInt(document.getElementById("masterDays").value) || 5);
    rxItems.push({
        id: Date.now() + Math.floor(Math.random() * 1000),
        brand: d["FIRST BRAND"],
        molecule: d.Active_Content,
        maxRaw: d.Max_Dose_Adult || 'Not specified',
        strength: extractDose(d.Active_Content),
        max: extractDose(d.Max_Dose_Adult),
        freqArr: ["1", "0", "0"],
        days,
        advice: "After Food",
        rawSig: '',
        customNote: '',
        isSos: false,
        isWeekly: false,
        weeklyDay: ''
    });
    renderRx();
}

function removeDrug(id) { rxItems = rxItems.filter(i => i.id !== id); renderRx(); }

// ══════════════════════════════════════════
// RX: RENDER (full rebuild — only on add/remove/template)
// ══════════════════════════════════════════
function renderRx() {
    const cont = document.getElementById("rxList");
    const badge = document.getElementById("rxCount");

     if (!rxItems.length) {
        cont.innerHTML = ""; 
        badge.innerText = "0 Meds";
        return;
    }

    badge.innerText = `${rxItems.length} Med${rxItems.length > 1 ? 's' : ''}`;
    cont.innerHTML = "";

    rxItems.forEach((item, idx) => {
        // Safety check (skip for combos)
        let safeHTML = '';
        const isCombo = item.strength.length > 1 || /[+&]/.test(String(item.molecule));
        if (!isCombo) {
            const s = item.strength[0] || 0, m = item.max?.[0] || 0;
            if (s > 0 && m > 0) {
                const parsedDaily = (item.freqArr || []).reduce((sum, val) => {
                    const num = val.includes('/') ? (parseInt(val.split('/')[0]) / parseInt(val.split('/')[1])) : parseFloat(val);
                    return sum + (isNaN(num) ? 0 : num);
                }, 0);
                const daily = parseFloat((parsedDaily * s).toFixed(2));
                const overdose = daily > m;
                if (overdose) safeHTML = `<span class="safety-badge safety-over">⚠ OD: ${daily}/${m}mg</span>`;
                else safeHTML = `<span class="safety-badge safety-ok">✓ Safe: ${daily}/${m}mg</span>`;
            }
        }

        // Build freq display
        let displayFreq = (item.freqArr || ["0","0","0"]).join(' - ');
        if (item.isSos) displayFreq = 'SOS';
        if (item.isWeekly) displayFreq = item.weeklyDay ? `Weekly (${item.weeklyDay})` : 'Weekly';

        // Build advice display
        const adviceTxt = [item.advice, (!item.isSos ? item.customNote : '')].filter(Boolean).join(' — ');

        const card = document.createElement('div');
        card.className = `rx-card`;
        card.innerHTML = `
            <div class="rx-sidebar" onclick="removeDrug(${item.id})" title="Remove">
                <div class="rx-sidebar-icon"><span></span><span></span><span></span></div>
            </div>
            <div class="rx-main">
                <div class="rx-header" style="display:flex;justify-content:space-between;">
                    <div style="display:flex;gap:10px;">
                        <div class="rx-num">${idx + 1}</div>
                        <div class="rx-names">
                            <div class="rx-brand">${item.brand}</div>
                            <div class="rx-generic">${item.molecule}</div>
                        </div>
                    </div>
                    <div style="display:flex;gap:8px;align-items:center;">
                        ${safeHTML ? `<div style="align-self:center;">${safeHTML}</div>` : ''}
                        <div class="rx-maxdose">Max: ${item.maxRaw}</div>
                    </div>
                </div>

                <div style="padding:8px 10px;background:#f8fafc;border-top:1px solid #e2e8f0;display:flex;gap:12px;align-items:center;">
                    
                    <div style="flex: 0 0 45%;"> 
                        <input type="text"
                               id="sig-${item.id}"
                               placeholder="e.g. 1bbf 1/2bd 30d cc-Avoid Curd"
                               class="premium-input w-full"
                               style="padding:8px 12px;font-size:14px;font-weight:700;color:#1e293b;border:1px solid #cbd5e1;border-radius:6px;"
                               value="${item.rawSig || ''}"
                               autocomplete="off">
                    </div>
                    
                    <div id="advice-display-${item.id}" 
                         style="flex:1; font-size:11px; color:#475569; font-style:italic; padding:0 10px; border-left:1px dashed #cbd5e1; line-height:1.2; ${adviceTxt ? '' : 'display:none;'}">
                        ↳ ${adviceTxt}
                    </div>

                    <div style="min-width:110px;text-align:right;border-left:2px solid #e2e8f0;padding-left:12px;">
                        <div id="freq-display-${item.id}" style="font-size:14px;font-weight:900;color:#0f172a;letter-spacing:1px;">${displayFreq}</div>
                        <div id="days-display-${item.id}" style="font-size:11px;font-weight:600;color:#64748b;margin-top:2px;">${item.days || ''}</div>
                    </div>
                </div>
            </div>`;

        // Attach input listener AFTER appending (no oninput in innerHTML — avoids reflow)
        cont.appendChild(card);
        const sigEl = card.querySelector(`#sig-${item.id}`);
        sigEl.addEventListener('input', function () {
            parseSmartSig(item.id, this.value);
            updateCardDisplay(item.id);
        });
sigEl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        srchInput.focus();
        srchInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
});

        
    });
}

// ══════════════════════════════════════════
// RX: LIVE UPDATE (no full re-render)
// ══════════════════════════════════════════
function updateCardDisplay(id) {
    const item = rxItems.find(x => x.id === id);
    if (!item) return;

    const freqEl = document.getElementById(`freq-display-${id}`);
    const daysEl = document.getElementById(`days-display-${id}`);
    const advEl  = document.getElementById(`advice-display-${id}`);

    if (freqEl) {
        let displayFreq = (item.freqArr || ["0","0","0"]).join(' - ');
        if (item.isSos) displayFreq = 'SOS';
        if (item.isWeekly) displayFreq = item.weeklyDay ? `Weekly (${item.weeklyDay})` : 'Weekly';
        freqEl.textContent = displayFreq;
    }
    if (daysEl) daysEl.textContent = item.days || '';
    if (advEl) {
        const txt = [item.advice, (!item.isSos ? item.customNote : '')].filter(Boolean).join(' — ');
        advEl.style.display = txt ? '' : 'none';
        advEl.textContent = txt ? `↳ ${txt}` : '';
    }
}

// ══════════════════════════════════════════
// SMART SIG PARSER
// ══════════════════════════════════════════
function parseSmartSig(id, val) {
    const item = rxItems.find(x => x.id === id);
    if (!item) return;

    item.rawSig = val;
    let workingStr = val.trim();
    item.customNote = '';
    item.days = '';
    item.isSos = false;
    item.isWeekly = false;
    item.weeklyDay = '';

    // 1. Extract custom note (cc-)
    const ccIndex = workingStr.toLowerCase().indexOf('cc-');
    if (ccIndex !== -1) {
        item.customNote = workingStr.substring(ccIndex + 3).trim();
        workingStr = workingStr.substring(0, ccIndex).trim();
    }

    // 2. Extract duration
    const durationMatch = workingStr.match(/(\d+)\s*(d|days?|w|wks?|weeks?|m|mos?|months?)\b/i);
    if (durationMatch) {
        const num = parseInt(durationMatch[1]);
        const rawUnit = durationMatch[2].toLowerCase();
        let unit;
        if (rawUnit.startsWith('m')) unit = num === 1 ? 'Month' : 'Months';
        else if (rawUnit.startsWith('w')) unit = num === 1 ? 'Week' : 'Weeks';
        else unit = num === 1 ? 'Day' : 'Days';
        item.days = `${num} ${unit}`;
        workingStr = workingStr.replace(durationMatch[0], '').trim();
    }

    // 3. Parse tokens
    const tokens = workingStr.toLowerCase().split(/\s+/);

    const adviceMap = {
        'af':  'After Food',
        'es':  'Empty Stomach',
        'sl':  'Sublingual',
        'md':  'Mouth Dissolving (Do not swallow)',
        'hgw': '+ Half glass water',
        '1lw': '+ 1 Liter water',
        'ad':  'Alternate Day',
        'stat':'STAT - Take Immediately',
        'bbf': 'Before Breakfast',
        'bl':  'Before Lunch',
        'bd':  'Before Dinner'
    };

    // slot: 0=Morning, 1=Noon, 2=Night
    const slotMap = { 'bbf': 0, 'm': 0, 'bl': 1, 'an': 1, 'bd': 2, 'n': 2 };

    let newFreq = ["0", "0", "0"];
    let selectedAdvice = [];
    let currentDose = "1";

    tokens.forEach(t => {
        if (!t) return;

        if (t === 'sos')  { item.isSos = true; return; }
        if (t === 'wo')   { item.isWeekly = true; return; }
        if (['sun','mon','tue','wed','thu','fri','sat'].includes(t)) {
            item.weeklyDay = t.charAt(0).toUpperCase() + t.slice(1);
            return;
        }
        if (t === 'tds') { newFreq = [currentDose, currentDose, currentDose]; return; }
        if (t === 'bid') { newFreq = [currentDose, "0", currentDose]; return; }
        if (t === 'od')  { newFreq = [currentDose, "0", "0"]; return; }

        if (t.includes('-') && /\d/.test(t)) {
            const parts = t.split('-');
            if (parts.length >= 3) newFreq = [parts[0], parts[1], parts[2]];
            else if (parts.length === 2) newFreq = [parts[0], "0", parts[1]];
            return;
        }

        // Pure dose token e.g. "1/2", "2", "1tsf"
        const pureMatch = t.match(/^([\d\.\/]+(?:tsf|ml|drop)?)$/);
        if (pureMatch) { currentDose = pureMatch[1].toUpperCase(); return; }

        // Compound token e.g. "1bbf", "1/2bd"
        const compMatch = t.match(/^([\d\.\/]+(?:tsf|ml|drop)?)?([a-z]+)$/);
        if (compMatch) {
            const dose = compMatch[1] ? compMatch[1].toUpperCase() : currentDose;
            const code = compMatch[2];
            if (slotMap[code] !== undefined) {
                newFreq[slotMap[code]] = dose;
                if (adviceMap[code]) selectedAdvice.push(adviceMap[code]);
            } else if (adviceMap[code]) {
                selectedAdvice.push(adviceMap[code]);
            }
        }
    });

    if ((item.isSos || item.isWeekly) && newFreq.every(f => f === "0")) newFreq[0] = currentDose;

    item.freqArr = newFreq;

    // Sort & consolidate advice
    let uniqueAdvice = [...new Set(selectedAdvice)];
    const hasBBF = uniqueAdvice.includes('Before Breakfast');
    const hasBL  = uniqueAdvice.includes('Before Lunch');
    const hasBD  = uniqueAdvice.includes('Before Dinner');
    if (hasBBF && hasBL && hasBD) {
        uniqueAdvice = uniqueAdvice.filter(a => !['Before Breakfast','Before Lunch','Before Dinner'].includes(a));
        uniqueAdvice.unshift('Before Meals');
    } else {
        const order = ['Empty Stomach','Before Breakfast','Before Lunch','Before Dinner','After Food'];
        uniqueAdvice.sort((a, b) => {
            const ia = order.indexOf(a); const ib = order.indexOf(b);
            return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
        });
    }
    item.advice = uniqueAdvice.join(', ');
}

    { key:'name', label:'Name' }, { key:'age', label:'Age' }, { key:'sex', label:'Sex' },
    { key:'bp', label:'BP' },     { key:'hr', label:'HR' },   { key:'temp', label:'Temp' },
    { key:'rs', label:'R/S' },    { key:'cvs', label:'CVS' }, { key:'cns', label:'CNS' },
    { key:'pa', label:'P/A' },    { key:'kco', label:'KCO' }, { key:'co', label:'C/O' }
];

function parseQuickEntry(str) {
    let raw = str.trim();
    let data = { name:[], age:'', sex:'', bp:'', hr:'', rs:'', cvs:'', cns:'', pa:'', temp:'', kco:[], co:'' };

    const coMatch = raw.match(/c\/o-(.+)/i);
    if (coMatch) { data.co = coMatch[1].trim(); raw = raw.replace(coMatch[0], ''); }

    const tokens = raw.trim().split(/\s+/);
    tokens.forEach(t => {
        if (!t) return;
        const tLow = t.toLowerCase();
        if (tLow === 'm' || tLow === 'f') { data.sex = tLow.toUpperCase(); }
        else if (/^\d{2,3}\/\d{2,3}$/.test(t)) { data.bp = t; }
        else if (tLow.startsWith('rs-'))  { const v=t.substring(3).replace(/-/g,' '); data.rs=(v==='n')?'B/L AE+, Clear':v; }
        else if (tLow.startsWith('cvs-')) { const v=t.substring(4).replace(/-/g,' '); data.cvs=(v==='n')?'S1S2+, No Murmur':v; }
        else if (tLow.startsWith('pa-'))  { const v=t.substring(3).replace(/-/g,' '); data.pa=(v==='n')?'Soft, NT':v; }
        else if (tLow.startsWith('cns-')) { const v=t.substring(4).replace(/-/g,' '); data.cns=(v==='n')?'Conscious, Oriented':v; }
        else if (tLow.startsWith('t-'))   { const v=t.substring(2).replace(/-/g,' '); data.temp=(v==='n')?'Afebrile':v; }
        else if (tLow.startsWith('kco-')) { data.kco=tLow.substring(4).split(',').filter(k=>k.trim()!==''); }
        else if (/^\d+$/.test(t)) {
            const num = parseInt(t,10);
            if (num>=1&&num<=120&&!data.age) data.age=num.toString();
            else if (num>=50&&num<=200&&!data.hr) data.hr=num.toString();
        } else if (/^[a-zA-Z]+$/.test(t)) {
            data.name.push(t.charAt(0).toUpperCase()+t.slice(1).toLowerCase());
        }
    });
    data.name = data.name.join(' ');
    return data;
}

function renderQuickChips(data) {
    let nextFound = false;
    qChips.innerHTML = qSeq.map(item => {
        const val = (item.key==='kco'&&data.kco.length) ? data.kco.join(', ') : data[item.key];
        if (val) return `<span class="px-2.5 py-1 text-[10px] font-bold uppercase tracking-widest rounded-lg border bg-emerald-100 text-emerald-700 border-emerald-300 shadow-sm">✓ ${item.label}: <span class="text-emerald-900">${val}</span></span>`;
        if (!nextFound) { nextFound=true; return `<span class="px-2.5 py-1 text-[10px] font-bold uppercase tracking-widest rounded-lg border bg-indigo-50 text-indigo-600 border-indigo-300 animate-pulse shadow-sm">${item.label}</span>`; }
        return `<span class="px-2.5 py-1 text-[10px] font-bold uppercase tracking-widest rounded-lg border bg-slate-100 text-slate-400 border-slate-200">${item.label}</span>`;
    }).join('');
}

function executeQuickFill() {
    if (!qInput.value.trim()) return;

    if (data.name) document.getElementById('ptName').value = data.name;

    if (data.kco.length > 0) {
        document.querySelectorAll('#kcoSection input[type="checkbox"]').forEach(chk => {
            const lbl = chk.nextElementSibling.innerText.toLowerCase();
            if (data.kco.some(k => lbl.includes(k.toLowerCase().trim()))) chk.checked = true;

    }
    qCard.classList.remove('border-l-indigo-500');
    qCard.classList.add('border-l-emerald-500','bg-emerald-50/30');

        qStatus.classList.add('hidden');

    qInput.value = '';
    renderQuickChips(parseQuickEntry(''));
    saveWorkspace();
}

        if (unit==='d') { days=num; durationLabel=num+' Days'; }
        if (unit==='w') { days=num*7; durationLabel=num+' Weeks'; }
        if (unit==='m') { days=num*30; durationLabel=num+' Months'; }
        if (unit==='y') { days=num*365; durationLabel=num+' Years'; }
        val = val.replace(timeMatch[0],'').replace(/,/g,' ').replace(/\s+/g,' ').trim();
    }
    document.getElementById('fuDays').value = days;
    let tests = val.split(/[\s,]+/).filter(Boolean);

function loadWorkspace() {
    const saved = localStorage.getItem('clinicalWorkspaceState');
    if (saved) {
        try {
            const d = JSON.parse(saved);
            const s = (id, v) => { if (v!==undefined&&document.getElementById(id)) document.getElementById(id).value=v; };
            s('ptName',d.ptName); s('date',d.date); s('ptAge',d.ptAge); s('ptSex',d.ptSex);
            s('bpInput',d.bpInput); s('ptPulse',d.ptPulse); s('ptTemp',d.ptTemp); s('ptSpo2',d.ptSpo2);
            s('ptRS',d.ptRS); s('ptCVS',d.ptCVS); s('ptPA',d.ptPA); s('ptCNS',d.ptCNS);
            s('complaints',d.complaints); s('fuDays',d.fuDays); s('fuSmartInput',d.fuSmartInput);
            s('generalAdvice',d.generalAdvice); s('masterDays',d.masterDays);
            if (d.rxItems) rxItems = d.rxItems;
            if (d.tapers)  tapers  = d.tapers;
            if (d.currentTaperSteps) currentTaperSteps = d.currentTaperSteps;
            if (d.checkboxes) {
                const cbs = document.querySelectorAll('input[type="checkbox"]');
                cbs.forEach((c,i) => { if (d.checkboxes[i]!==undefined) c.checked=d.checkboxes[i]; });
            }
            // Restore fu chips display
            if (d.fuSmartInput) document.getElementById('fuSmartInput').dispatchEvent(new Event('input'));
        } catch(e) { console.error(e); initDefaults(); }
    } else {
        initDefaults();

    renderRx();

    renderActiveTapers();
    setInterval(saveWorkspace, 1500);
}

                const f = item.freqArr || ["0","0","0"];
                const getCell = val => {
                    if (!val||val==='0') return '<span style="color:#000000;font-size:12px;">✕</span>';
                    if (val==='1') return '<span style="color:#000;font-weight:900;font-size:14px;">1</span>';
                    return `<span style="color:#000;font-weight:900;font-size:13px;">${val}</span>`;
                };

                let gridRow='';
                const doseVal = f[0]!=='0'?f[0]:(f[1]!=='0'?f[1]:(f[2]!=='0'?f[2]:'1'));

                // Consistent days display — use item.days as string directly
                const daysDisplay = item.isWeekly
                    ? `${parseInt(item.days)||item.days} Wks`
                    : (item.days||'-');

                if (item.isSos) {
                    const reason = item.customNote ? `if ${item.customNote}` : 'if needed';
                    gridRow=`<td colspan="3" style="text-align:center;padding:12px 5px;font-weight:900;background:#f8fafc;border:1px solid #e2e8f0;color:#000;font-size:12px;">${doseVal} — SOS ${reason}</td>`;
                } else if (item.isWeekly) {
                    const dayLabel=item.weeklyDay?`(${item.weeklyDay})`:'';
                    gridRow=`<td colspan="3" style="text-align:center;padding:12px 5px;font-weight:900;background:#f8fafc;border:1px solid #e2e8f0;color:#000;font-size:12px;">${doseVal} — Weekly Once ${dayLabel}</td>`;
                } else {
                    gridRow=`<td style="padding:12px 5px;text-align:center;">${getCell(f[0])}</td><td style="padding:12px 5px;text-align:center;">${getCell(f[1])}</td><td style="padding:12px 5px;text-align:center;">${getCell(f[2])}</td>`;
                }

                const subRowText = [item.advice, (!item.isSos?item.customNote:'')].filter(Boolean).join(' — ');
                const rs = subRowText ? 'rowspan="2"' : '';
                return `
                <tr style="border-bottom:${subRowText?'0px':'1px solid #e2e8f0'};">
                    <td ${rs} style="padding:12px 5px;font-size:12px;color:#475569;vertical-align:middle;">${i+1}</td>
                    <td ${rs} style="padding:12px 5px;vertical-align:middle;">
                        <div style="font-size:12px;font-weight:900;color:#000;line-height:1.2;">${item.brand}</div>
                        <div style="font-size:9px;color:#64748b;font-style:italic;margin-top:4px;">(${item.molecule})</div>
                    </td>
                    ${gridRow}
                    <td ${rs} style="padding:12px 5px;text-align:center;vertical-align:middle;">
                        <span style="display:inline-block;border:1px solid #cbd5e1;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:900;color:#000;">${daysDisplay}</span>
                    </td>
                </tr>
                ${subRowText?`<tr style="border-bottom:1px solid #e2e8f0;"><td colspan="3" style="padding:0 5px 12px 5px;text-align:center;vertical-align:top;"><div style="display:inline-block;padding:3px 12px;border-radius:4px;font-size:9px;color:#000;font-weight:800;border:1px dashed #cbd5e1;">↳ ${subRowText}</div></td></tr>`:''}`;
            }).join('')}
            </tbody>
        </table>`;

    const tapersHtml = tapers.length ? tapers.map(t=>`
        <div style="margin-bottom:14px;border:0.5px solid #fca5a5;border-radius:6px;overflow:hidden;page-break-inside:avoid;">
            <div style="background:#fee2e2;padding:5px 10px;font-weight:800;font-size:12px;color:#991b1b;">${t.drug} — Tapering Schedule</div>
            <table style="width:100%;font-size:11px;border-collapse:collapse;background:#fff;">
                ${t.steps.map((s,i)=>`<tr><td style="padding:4px 8px;border-bottom:0.5px solid #fecaca;width:55px;color:#64748b;">Step ${i+1}</td><td style="padding:4px 8px;border-bottom:0.5px solid #fecaca;font-weight:700;">${s.dose}</td><td style="padding:4px 8px;border-bottom:0.5px solid #fecaca;color:#475569;">(${s.freq})</td><td style="padding:4px 8px;border-bottom:0.5px solid #fecaca;font-weight:600;">× ${s.days} Days</td></tr>`).join('')}
                <tr><td colspan="4" style="padding:5px 8px;background:#fef2f2;font-weight:800;text-align:center;color:#b91c1c;font-size:10px;letter-spacing:1px;">STOP MEDICATION</td></tr>
            </table>
        </div>`).join('') : '';

    let fuString='';
    if(fuDays&&invList) fuString=`Follow-up with <b>${invList}</b> in <b>${document.getElementById('fuSmartInput').value.match(/(\d+\s*[dwmy])/i)?.[0]||fuDays+' days'}</b>`;
    else if(invList) fuString=`Follow-up with <b>${invList}</b>`;
    else if(fuDays) fuString=`Follow-up in <b>${fuDays} days</b>`;
    const fuBlock = fuString ? `
        <div style="margin-top:18px;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:8px 12px;">
            <div style="font-size:10px;font-weight:800;color:#92400e;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;">Follow-Up</div>
            <div style="font-size:12px;color:#78350f;line-height:1.5;">${fuString}</div>
        </div>` : '';

    function leftSection(label, content) {
        return `<div style="margin-bottom:16px;padding-left:8px;border-left:2px solid #e2e8f0;">
            <div style="font-size:9px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;">${label}</div>
            <div style="font-size:11px;color:#334155;line-height:1.7;">${content}</div>
        </div>`;
    }
    const leftCol = [
        complaints ? leftSection('Clinical Note', complaints) : '',
        kcoList ? leftSection('Known Case Of', kcoList) : '',
        generalAdvice ? leftSection('Advice / Instructions', generalAdvice) : '',
    ].join('');

    pDiv.innerHTML = `
        <div style="margin-bottom:20px;padding:12px 16px;border:0.5px solid #e2e8f0;border-radius:8px;background:#fafbff;">
            <div style="display:flex;justify-content:space-between;align-items:baseline;">
                <div style="font-size:15px;font-weight:800;color:#0f172a;letter-spacing:-0.01em;">${patientLine}</div>
                <div style="font-size:11px;font-weight:600;color:#64748b;">${date}</div>
            </div>
            ${vitalsRow}
        </div>
        <div style="display:table;width:100%;border-collapse:collapse;">
            <div style="display:table-cell;width:25%;padding-right:20px;border-right:0.5px solid #e2e8f0;vertical-align:top;">
                ${leftCol||'<div style="font-size:11px;color:#cbd5e1;font-style:italic;">No notes.</div>'}
            </div>
            <div style="display:table-cell;width:75%;padding-left:22px;vertical-align:top;">
                <div style="font-size:26px;font-weight:900;font-family:Georgia,serif;color:#1e293b;line-height:1;margin-bottom:6px;">℞</div>
                ${drugsHtml||(!tapers.length?'<div style="color:#94a3b8;font-size:12px;font-style:italic;margin-bottom:14px;">No medications prescribed.</div>':'')}
                ${tapersHtml}
                ${fuBlock}
                <div style="height:0.5px;background:#e2e8f0;margin-top:22px;margin-bottom:36px;"></div>
            </div>
        </div>
        <div style="text-align:right;margin-top:8px;padding-top:14px;border-top:0.5px solid #e2e8f0;">
            <div style="font-size:16px;font-weight:900;color:#0f172a;letter-spacing:-0.01em;">Dr. Mit Panchani</div>
            <div style="font-size:11.5px;font-weight:700;color:#334155;margin-top:2px;">MBBS, MD (Medicine)</div>
            <div style="font-size:10px;font-weight:700;color:#334155;margin-top:2px;">FELLOW IN 2D ECHO, PGCIH</div>
        </div> 
        <div class="print-software-credit">Prescription Software developed by Dr. Mit Panchani</div>`;
        
    window.print();
}

window.onload = loadWorkspace;
</script>

</body>
</html>
